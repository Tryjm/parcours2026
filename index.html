const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const months=[...new Set(ROUTES.map(r=>parseInt(r.date.split("-")[1])-1))].sort((a,b)=>a-b);
let mIdx=0,activeIdx=null,zoomLvl=13,viewX=0,viewY=0;
let dragging=false,dragStart=null,viewStart=null;
const tileCache={};
const wrap=document.getElementById("mapwrap");
const canvas=document.getElementById("mc");
const ctx=canvas.getContext("2d");

function lonToTile(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z));}
function latToTile(lat,z){return Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z));}
function latlonToPx(lat,lon){
  const scale=256*Math.pow(2,zoomLvl);
  const px=(lon+180)/360*scale;
  const sinLat=Math.sin(lat*Math.PI/180);
  const py=(0.5-Math.log((1+sinLat)/(1-sinLat))/(4*Math.PI))*scale;
  return [px-viewX,py-viewY];
}

function getTile(z,x,y){
  const key=z+"/"+x+"/"+y;
  if(tileCache[key]) return tileCache[key];
  const img=new Image();
  img.crossOrigin="anonymous";
  const sub=["a","b","c"][(x+y)%3];
  img.src="https://"+sub+".tile.openstreetmap.org/"+z+"/"+x+"/"+y+".png";
  img.onload=()=>{tileCache[key]=img;draw();};
  tileCache[key]=null;
  return null;
}

function draw(){
  const W=canvas.width,H=canvas.height;
  if(!W||!H) return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#e8eaed";
  ctx.fillRect(0,0,W,H);
  const ts=256,maxT=Math.pow(2,zoomLvl);
  const tx0=Math.floor(viewX/ts),ty0=Math.floor(viewY/ts);
  const tx1=Math.floor((viewX+W)/ts),ty1=Math.floor((viewY+H)/ts);
  for(let tx=tx0;tx<=tx1;tx++){
    for(let ty=ty0;ty<=ty1;ty++){
      const wx=((tx%maxT)+maxT)%maxT,wy=((ty%maxT)+maxT)%maxT;
      const img=getTile(zoomLvl,wx,wy);
      const px=tx*ts-viewX,py=ty*ts-viewY;
      if(img){ctx.drawImage(img,px,py,ts,ts);}
      else{ctx.fillStyle="#ddd";ctx.fillRect(px,py,ts,ts);ctx.strokeStyle="#ccc";ctx.strokeRect(px,py,ts,ts);}
    }
  }
  if(activeIdx!==null){
    const coords=ROUTES[activeIdx].coords;
    ctx.beginPath();
    ctx.strokeStyle="#4285f4";ctx.lineWidth=3;ctx.lineJoin="round";ctx.lineCap="round";ctx.globalAlpha=0.85;
    let first=true;
    for(const pt of coords){
      const [px,py]=latlonToPx(pt[0],pt[1]);
      first?ctx.moveTo(px,py):ctx.lineTo(px,py);
      first=false;
    }
    ctx.stroke();ctx.globalAlpha=1;
    const [sx,sy]=latlonToPx(coords[0][0],coords[0][1]);
    ctx.beginPath();ctx.arc(sx,sy,6,0,2*Math.PI);
    ctx.fillStyle="#34a853";ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
  }
}

function fitRoute(coords){
  const lats=coords.map(c=>c[0]),lons=coords.map(c=>c[1]);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLon=Math.min(...lons),maxLon=Math.max(...lons);
  const W=canvas.width,H=canvas.height;
  for(let z=16;z>=1;z--){
    const x0=lonToTile(minLon,z)*256,y0=latToTile(maxLat,z)*256;
    const x1=(lonToTile(maxLon,z)+1)*256,y1=(latToTile(minLat,z)+1)*256;
    if((x1-x0)<W*0.85&&(y1-y0)<H*0.85){
      zoomLvl=z;
      const scale=256*Math.pow(2,z);
      const cx=(minLon+maxLon)/2,cy=(minLat+maxLat)/2;
      const sinC=Math.sin(cy*Math.PI/180);
      const px=(cx+180)/360*scale;
      const py=(0.5-Math.log((1+sinC)/(1-sinC))/(4*Math.PI))*scale;
      viewX=Math.round(px-W/2);viewY=Math.round(py-H/2);
      break;
    }
  }
  draw();
}

function applyZoom(delta,cx,cy){
  const prev=zoomLvl;
  zoomLvl=Math.max(1,Math.min(18,zoomLvl+delta));
  if(zoomLvl===prev) return;
  const sc=Math.pow(2,zoomLvl-prev);
  viewX=Math.round((viewX+cx)*sc-cx);
  viewY=Math.round((viewY+cy)*sc-cy);
  draw();
}

function resizeCanvas(){
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  draw();
}

canvas.addEventListener("mousedown",e=>{dragging=true;dragStart=[e.clientX,e.clientY];viewStart=[viewX,viewY];});
window.addEventListener("mousemove",e=>{if(!dragging)return;viewX=viewStart[0]-(e.clientX-dragStart[0]);viewY=viewStart[1]-(e.clientY-dragStart[1]);draw();});
window.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("wheel",e=>{e.preventDefault();applyZoom(e.deltaY>0?-1:1,e.offsetX,e.offsetY);},{passive:false});
document.getElementById("btnZoomIn").addEventListener("click",()=>applyZoom(1,canvas.width/2,canvas.height/2));
document.getElementById("btnZoomOut").addEventListener("click",()=>applyZoom(-1,canvas.width/2,canvas.height/2));
document.getElementById("btnPrev").addEventListener("click",()=>{if(mIdx>0){mIdx--;renderList();}});
document.getElementById("btnNext").addEventListener("click",()=>{if(mIdx<months.length-1){mIdx++;renderList();}});
window.addEventListener("resize",resizeCanvas);

function renderList(){
  const m=months[mIdx];
  document.getElementById("monthLabel").textContent=MONTHS[m];
  const items=ROUTES.map((r,i)=>({r,i})).filter(({r})=>parseInt(r.date.split("-")[1])-1===m);
  const list=document.getElementById("routeList");
  if(!items.length){list.innerHTML="<div class='nomonth'>Aucun circuit ce mois</div>";return;}
  list.innerHTML=items.map(({r,i})=>{
    const d=new Date(r.date+"T12:00:00");
    const day=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric"});
    return "<div class='route-item"+(i===activeIdx?" active":"")+"' data-idx='"+i+"'><div class='rday'>"+day+"</div><div class='rname'>"+r.name+"</div></div>";
  }).join("");
  list.querySelectorAll(".route-item").forEach(el=>{
    el.addEventListener("click",()=>selectRoute(parseInt(el.dataset.idx)));
  });
}

function selectRoute(idx){
  activeIdx=idx;
  renderList();
  const r=ROUTES[idx];
  const d=new Date(r.date+"T12:00:00");
  document.getElementById("dName").textContent=r.name;
  document.getElementById("dDate").textContent=d.toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  document.getElementById("dDist").textContent=r.dist.toFixed(1)+" km";
  document.getElementById("dDp").textContent=r.dp.toLocaleString()+" m";
  document.getElementById("detail").classList.add("show");
  document.getElementById("emptyMap").style.display="none";
  document.getElementById("zbx").style.display="flex";
  fitRoute(r.coords);
}

resizeCanvas();
renderList();
</script>
